<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Minh Hải Logistics CRM</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-app);
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo i {
      font-size: 40px;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    .login-logo h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .login-logo p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }
    .input-wrapper input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px 10px 38px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-wrapper input:focus {
      border-color: var(--color-primary);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-md);
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .btn-login:hover {
      opacity: 0.9;
    }
    .error-msg {
      color: var(--color-error);
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div style="display: flex; justify-content: center; margin-bottom: 16px;">
          <img src="logo.png" style="height: 60px; width: auto; object-fit: contain;">
        </div>
        <h2>Minh Hải Logistics</h2>
        <p>Hệ Thống Quản Trị CRM & Vận Hành</p>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập..." required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
          </div>
        </div>
        
        <button type="submit" class="btn-login" id="btn-submit">
          <i class="fa-solid fa-right-to-bracket"></i> Đăng Nhập
        </button>
        
        <div class="error-msg" id="error-box">Tài khoản hoặc mật khẩu không chính xác!</div>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
